services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"   # expose for local inspection; remove in production

  yeet:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - API_KEY=${API_KEY}         # set in your shell or a .env file
      - MONGO_URI=mongodb://mongo:27017
      - PORT=8080
    depends_on:
      - mongo

volumes:
  mongo-data:
