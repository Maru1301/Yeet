name: Deploy to k8s

on:
  workflow_dispatch:        # trigger manually from GitHub Actions UI
  push:
    branches:
      - cloud-k8s           # or change to master when ready

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/yeet:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      # ── Apply infrastructure that carries no secrets ───────────────────────
      - name: Apply PVC and MongoDB
        run: |
          kubectl apply -f k8s/pvc.yaml
          kubectl apply -f k8s/mongo.yaml

      # ── Create/update the k8s Secret from GitHub Secrets ──────────────────
      # Real values never touch the repo — only live in the Secret object.
      - name: Apply k8s secret
        run: |
          kubectl create secret generic yeet-secret \
            --from-literal=api-key="${{ secrets.API_KEY }}" \
            --from-literal=mongo-uri="${{ secrets.MONGO_URI }}" \
            --save-config --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply deployment and service
        run: |
          sed 's|image: yeet:latest|image: ghcr.io/${{ github.repository_owner }}/yeet:${{ github.sha }}|g' k8s/deployment.yaml \
            | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/yeet --timeout=120s
