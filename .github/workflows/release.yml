name: Release

on:
  pull_request:
    branches:
      - master
    types: [closed]

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client-app/package-lock.json

      - name: Build frontend
        run: |
          cd client-app
          npm ci
          npm run build:Release

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Windows executable
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -o yeet.exe .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(date +'%Y.%m.%d')-${{ github.run_number }}"
          gh release create "$TAG" yeet.exe \
            --title "Release $TAG" \
            --notes "**PR #${{ github.event.pull_request.number }}** — ${{ github.event.pull_request.title }}

          ### Usage
          1. Download \`yeet.exe\`
          2. Set your Google AI Studio key: \`\$env:API_KEY=\"AIza...\"\`
          3. Run: \`.\yeet.exe\`
          4. Open \`http://localhost:8080\` in your browser"
